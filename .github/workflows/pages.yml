name: Deploy RedHydra frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      HUSKY: "0"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Verify project root
        run: |
          pwd
          ls -la
          test -f package.json || (echo "package.json not found at repo root" && exit 1)
          node -e "const p=require('./package.json'); console.log('Package:', p.name, p.version); console.log('Build script:', p.scripts && p.scripts['build:pages']);"

      - name: Clean broken npm artifacts from runner
        run: |
          rm -rf node_modules
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock
          pnpm store prune || true

      - name: Install frontend dependencies with pnpm
        run: |
          pnpm install --no-frozen-lockfile --prod=false --strict-peer-dependencies=false

      - name: Verify Vite
        run: |
          pnpm exec vite --version

      - name: Build GitHub Pages frontend
        run: |
          pnpm run build:pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
