name: Monthly RedHydra AI Maintenance Check

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build check
        run: npm run build
      - name: Dependency audit summary
        run: npm audit --audit-level=high || true
      - name: Create maintenance reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Monthly RedHydra AI maintenance check - ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              'Automated monthly maintenance check completed.',
              '',
              '- Build was executed.',
              '- Dependency audit was executed.',
              '- Review public security data sources and training content manually.',
              '- Update AI provider notes if model compatibility changed.',
              '',
              'This workflow does not self-modify code. It creates a transparent maintenance trail.'
            ].join('\n');
            await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
