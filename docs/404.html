"""
Security Header Checker
Use only for websites you own or are authorized to assess.
"""
import argparse
import sys
import requests

RECOMMENDED_HEADERS = {
    "Content-Security-Policy": "Helps reduce XSS impact",
    "Strict-Transport-Security": "Forces HTTPS after first trusted visit",
    "X-Content-Type-Options": "Prevents MIME sniffing",
    "X-Frame-Options": "Reduces clickjacking risk",
    "Referrer-Policy": "Limits sensitive referrer leakage",
    "Permissions-Policy": "Restricts powerful browser features",
}

def check(url: str) -> int:
    try:
        response = requests.get(url, timeout=10, allow_redirects=True)
    except requests.RequestException as exc:
        print(f"[error] request failed: {exc}")
        return 2

    print(f"URL: {response.url}")
    print(f"Status: {response.status_code}")
    print("\\nHeader review:")

    missing = 0
    for header, purpose in RECOMMENDED_HEADERS.items():
        value = response.headers.get(header)
        if value:
            print(f"[ok] {header}: {value}")
        else:
            missing += 1
            print(f"[missing] {header} — {purpose}")

    print(f"\\nMissing headers: {missing}")
    return 1 if missing else 0

if __name__ == "__main__":
    parser = argparse.ArgumentParser(description="Check common defensive HTTP security headers.")
    parser.add_argument("url", help="Authorized URL, e.g. https://example.com")
    args = parser.parse_args()
    if not args.url.startswith(("http://", "https://")):
        print("URL must start with http:// or https://")
        sys.exit(2)
    sys.exit(check(args.url))

"""
Safe Port Checker for owned/authorized lab systems.
No stealth, evasion, exploitation, or high-speed scanning.
"""
import argparse
import socket
from concurrent.futures import ThreadPoolExecutor

COMMON_PORTS = [22, 80, 443, 445, 3306, 5432, 6379, 8080]

def check_port(host: str, port: int, timeout: float = 1.0):
    with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:
        sock.settimeout(timeout)
        result = sock.connect_ex((host, port))
        return port, result == 0

def main():
    parser = argparse.ArgumentParser(description="Check common open ports on an authorized host.")
    parser.add_argument("host", help="Owned or authorized hostname/IP")
    parser.add_argument("--ports", default=",".join(map(str, COMMON_PORTS)), help="Comma-separated ports")
    args = parser.parse_args()
    ports = [int(p.strip()) for p in args.ports.split(",") if p.strip().isdigit()]
    print(f"Checking {args.host} for {len(ports)} ports...")
    with ThreadPoolExecutor(max_workers=8) as pool:
        for port, open_ in pool.map(lambda p: check_port(args.host, p), ports):
            print(f"{port}/tcp {'open' if open_ else 'closed'}")

if __name__ == "__main__":
    main()
