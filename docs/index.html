#!/usr/bin/env python3
"""
RedHydra AI - Security Header Checker
Purpose: Check common defensive HTTP security headers on an owned/authorized website.
Usage: python security_headers.py https://example.com
"""
import sys
import requests

REQUIRED_HEADERS = {
    "content-security-policy": "Helps reduce XSS impact by controlling script/content sources.",
    "strict-transport-security": "Forces HTTPS in supported browsers after first secure visit.",
    "x-content-type-options": "Use nosniff to reduce MIME confusion risks.",
    "x-frame-options": "Helps reduce clickjacking risk. CSP frame-ancestors is preferred for modern apps.",
    "referrer-policy": "Limits sensitive URL data leakage through the Referer header.",
    "permissions-policy": "Restricts browser features such as camera, microphone, and geolocation."
}

def check_headers(url: str) -> int:
    try:
        response = requests.get(url, timeout=10, allow_redirects=True)
    except requests.RequestException as exc:
        print(f"[ERROR] Could not reach target: {exc}")
        return 2

    headers = {k.lower(): v for k, v in response.headers.items()}
    print(f"Target: {response.url}")
    print(f"Status: {response.status_code}\\n")

    missing = []
    for header, reason in REQUIRED_HEADERS.items():
        if header in headers:
            print(f"[OK] {header}: {headers[header]}")
        else:
            print(f"[MISSING] {header} - {reason}")
            missing.append(header)

    print("\\nSummary:")
    if missing:
        print(f"Missing {len(missing)} recommended header(s): {', '.join(missing)}")
        return 1
    print("All checked headers are present. Review values manually for correctness.")
    return 0

if __name__ == "__main__":
    if len(sys.argv) != 2 or not sys.argv[1].startswith(("http://", "https://")):
        print("Usage: python security_headers.py https://example.com")
        sys.exit(2)
    sys.exit(check_headers(sys.argv[1]))

"""
RedHydra AI - Lab-Safe TCP Port Checker
Purpose: Check selected TCP ports on owned/local systems.
Usage: python port_check.py 127.0.0.1 22,80,443
"""
import socket
import sys

def check_port(host: str, port: int, timeout: float = 1.0) -> bool:
    with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
        s.settimeout(timeout)
        return s.connect_ex((host, port)) == 0

def main():
    if len(sys.argv) != 3:
        print("Usage: python port_check.py 127.0.0.1 22,80,443")
        return 2
    host = sys.argv[1]
    ports = [int(p.strip()) for p in sys.argv[2].split(",") if p.strip().isdigit()]
    if not ports or len(ports) > 50:
        print("Provide 1-50 comma-separated ports for an authorized host.")
        return 2
    for port in ports:
        status = "open" if check_port(host, port) else "closed/filtered"
        print(f"{host}:{port} -> {status}")
    return 0

if __name__ == "__main__":
    raise SystemExit(main())
