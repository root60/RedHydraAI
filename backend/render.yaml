services:
  - type: web
    name: redhydra-opencore-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: ENABLE_WEB_SEARCH
        value: "true"
      - key: ENABLE_DEEP_RESEARCH
        value: "true"
      - key: WEB_SEARCH_MODE
        value: auto
