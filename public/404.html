<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RedHydra AI</title>
    <script>
      const base = '/RedHydraAI/';
      const path = window.location.pathname;
      if (!path.startsWith(base)) window.location.replace(base);
      else window.location.replace(base + '#' + path.replace(base, '') + window.location.search);
    </script>
  </head>
  <body>Redirecting...</body>
</html>
